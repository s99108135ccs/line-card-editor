<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>THE TAG 名片分享</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .card{background:#fff;border-radius:20px;padding:40px 32px;max-width:360px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.12)}
  .logo{font-size:48px;margin-bottom:16px}
  .title{font-size:20px;font-weight:800;color:#00b900;margin-bottom:8px}
  .sub{font-size:14px;color:#888;margin-bottom:32px;line-height:1.6}
  .status{font-size:15px;color:#444;margin-bottom:8px;font-weight:600}
  .progress{width:100%;height:6px;background:#e8e8e8;border-radius:3px;overflow:hidden;margin-bottom:24px}
  .progress-bar{height:100%;background:#00b900;border-radius:3px;transition:width .3s;width:0%}
  .btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px}
  .btn-green{background:#00b900;color:#fff}
  .btn-gray{background:#f5f5f5;color:#666;border:1.5px solid #e0e0e0}
  .err{color:#e53935;font-size:13px;margin-top:16px;line-height:1.5;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">📇</div>
  <div class="title">THE TAG 名片發送</div>
  <div class="sub" id="sub-text">正在準備名片資料，請稍候...</div>
  <div class="status" id="status-text">⏳ 初始化中...</div>
  <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
  <button class="btn btn-green" id="btn-share" style="display:none" onclick="doShare()">📤 選擇傳送對象</button>
  <button class="btn btn-gray" id="btn-retry" style="display:none" onclick="location.reload()">🔄 重試</button>
  <div class="err" id="err-msg"></div>
</div>

<script>
const LIFF_ID = '2009436722-KlVkAIhF';
let pendingMsg = null;

function setProgress(pct){ document.getElementById('progress-bar').style.width = pct + '%'; }
function setStatus(txt){ document.getElementById('status-text').textContent = txt; }
function showErr(msg){
  document.getElementById('err-msg').style.display = 'block';
  document.getElementById('err-msg').textContent = msg;
  document.getElementById('btn-retry').style.display = 'block';
  document.getElementById('btn-share').style.display = 'none';
}

// 從 URL 讀取壓縮資料
function getMsgFromUrl(){
  try{
    // 先試 location.search（LIFF concatenate mode 下參數在這裡）
    const sp = new URLSearchParams(location.search);
    
    // 直接帶 gz 參數
    let gz = sp.get('gz');
    
    // 從 liff.state 讀（LIFF 跳轉時把額外參數放這裡）
    if(!gz){
      const liffState = sp.get('liff.state');
      if(liffState){
        const decoded = decodeURIComponent(liffState);
        const stateSp = new URLSearchParams(decoded.startsWith('?') ? decoded.slice(1) : decoded);
        gz = stateSp.get('gz');
      }
    }

    if(!gz) return null;

    // URL-safe base64 decode
    const b64 = gz.replace(/-/g,'+').replace(/_/g,'/');
    const pad = b64.length % 4 ? '='.repeat(4 - b64.length % 4) : '';
    const binary = atob(b64 + pad);
    const bytes = new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
    
    // pako 解壓縮
    const msgStr = pako.inflate(bytes, {to:'string'});
    return JSON.parse(msgStr);
  } catch(e){
    console.error('getMsgFromUrl error:', e);
    return null;
  }
}

async function doShare(){
  try{
    document.getElementById('btn-share').style.display = 'none';
    setStatus('📤 開啟 LINE 選人畫面...');
    const result = await liff.shareTargetPicker([pendingMsg]);
    if(result){
      setStatus('✅ 名片已發送！');
      document.getElementById('sub-text').textContent = '成功！對方已收到你的名片。';
      setProgress(100);
      setTimeout(()=>liff.closeWindow(), 1500);
    } else {
      setStatus('ℹ️ 已取消');
      document.getElementById('btn-share').style.display = 'block';
    }
  } catch(e){
    showErr('發送失敗：' + e.message);
  }
}

window.addEventListener('load', async function main(){
  try{
    setProgress(20);
    setStatus('⏳ 連接 LINE...');

    // 等 LIFF SDK 載入
    let waited = 0;
    while(typeof liff === 'undefined' && waited < 10000){
      await new Promise(r=>setTimeout(r,300));
      waited += 300;
    }
    if(typeof liff === 'undefined') throw new Error('LIFF SDK 未載入，請確認網路連線');

    // 先讀資料（在 init 前，因為 init 後 URL 可能被改）
    const msgFromUrl = getMsgFromUrl();
    if(msgFromUrl){
      sessionStorage.setItem('pending_msg', JSON.stringify(msgFromUrl));
    }

    setProgress(40);
    await liff.init({ liffId: LIFF_ID });
    setProgress(60);

    // 未登入 → 登入
    if(!liff.isLoggedIn()){
      setStatus('🔐 請登入 LINE...');
      liff.login({ redirectUri: location.href });
      return;
    }

    setProgress(80);
    setStatus('⏳ 讀取名片資料...');

    // 讀取訊息（優先從 sessionStorage，其次從 URL）
    const stored = sessionStorage.getItem('pending_msg');
    if(stored){
      pendingMsg = JSON.parse(stored);
      sessionStorage.removeItem('pending_msg');
    } else if(msgFromUrl){
      pendingMsg = msgFromUrl;
    }

    if(!pendingMsg){
      throw new Error('找不到名片資料，請重新掃描 QR code');
    }

    setProgress(100);

    // 檢查是否支援 shareTargetPicker
    if(!liff.isApiAvailable('shareTargetPicker')){
      throw new Error('此環境不支援發送功能，請確認已開啟 Share target picker');
    }

    // 直接觸發分享
    setStatus('📤 開啟 LINE 選人畫面...');
    document.getElementById('sub-text').textContent = '選擇要傳送名片的對象';
    const result = await liff.shareTargetPicker([pendingMsg]);
    if(result){
      setStatus('✅ 名片已發送！');
      document.getElementById('sub-text').textContent = '成功！對方已收到你的名片。';
      setTimeout(()=>{ try{ liff.closeWindow(); } catch(e){} }, 1500);
    } else {
      setStatus('請點下方按鈕重新選擇');
      document.getElementById('btn-share').style.display = 'block';
    }

  } catch(e){
    console.error(e);
    showErr(e.message);
    setStatus('❌ 發生錯誤');
  }
});
</script>
</body>
</html>
