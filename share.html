<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="theme-color" content="#ffffff">
<!-- LINE App 內建 webview cache 太頑固，強制 no-cache 避免 user 看到舊版 throw -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>數位名片</title>

<meta property="og:title" content="數位名片">
<meta property="og:description" content="THE TAG 數位版名片">
<meta property="og:type" content="profile">
<meta property="og:image" content="">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@400;700;900&family=ZCOOL+XiaoWei&family=ZCOOL+QingKe+HuangYou&family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&family=Liu+Jian+Mao+Cao&family=DotGothic16&family=Bebas+Neue&family=Bungee&family=Playfair+Display:wght@700;900&family=Pacifico&family=Permanent+Marker&family=Press+Start+2P&family=VT323&family=Plaster&family=Major+Mono+Display&family=Cinzel:wght@700;900&family=Russo+One&family=Anton&family=Caveat:wght@600;700&family=Silkscreen:wght@400;700&family=Pixelify+Sans:wght@400;700&family=Jersey+10&family=Tiny5&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[hidden]{display:none!important}

:root {
  --bg: #f5f5f7;
  --card-bg: #ffffff;
  --text: #111111;
  --text2: #666666;
  --text3: #999999;
  --line: rgba(0,0,0,.08);
  --line-strong: rgba(0,0,0,.16);
  --primary: #111111;
  --font: 'Inter', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
  --r: 16px;
  --r-btn: 10px;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  letter-spacing: -.005em;
}

body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  min-height: 100dvh;
}

/* ═══ Top nav ═══ */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  background: var(--card-bg);
  border-bottom: 1px solid var(--line);
}
.nav-mark {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .04em;
}
.nav-meta {
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: .08em;
}

/* ═══ Loading ═══ */
#loading {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
  padding: 80px 24px;
}
.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--line);
  border-top-color: var(--text);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--text3); font-size: 12px; letter-spacing: .08em; }

/* ═══ Error ═══ */
#error {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  padding: 80px 24px;
  text-align: center;
  gap: 14px;
}
.error-mark { font-size: 56px; opacity: .3; }
.error-title { font-size: 16px; font-weight: 700; }
.error-msg { color: var(--text2); font-size: 13px; max-width: 320px; line-height: 1.6; }

/* ═══ Main ═══ */
#content { flex: 1; }
.cards-wrap {
  padding: 20px 16px 40px;
  max-width: 480px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
@media (min-width: 600px) {
  .cards-wrap { padding: 32px 24px 60px; }
}

/* ═══ Card ═══ */
.card {
  background: var(--card-bg);
  border-radius: var(--r);
  border: 1px solid var(--line);
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,.04);
  opacity: 0;
  transform: translateY(12px);
  animation: cardIn .4s forwards ease-out;
}
.card:nth-child(1){ animation-delay: .05s; }
.card:nth-child(2){ animation-delay: .15s; }
.card:nth-child(n+3){ animation-delay: .25s; }
@keyframes cardIn {
  to { opacity: 1; transform: translateY(0); }
}

/* Card hero (background + avatar overlay) */
.card-hero {
  position: relative;
  width: 100%;
  background-color: #f0f0f0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  overflow: hidden;
}
.card-hero[data-link] { cursor: pointer; }
.card-hero.flip { background-position: center; transform: scaleX(-1); }
.card-hero.flip > * { transform: scaleX(-1); }
.card-avatar {
  position: absolute;
  z-index: 2;
  pointer-events: none;
}
.card-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.card-avatar.shape-circle img,
.card-avatar.shape-circle { border-radius: 50%; }
.card-avatar.shape-rounded img,
.card-avatar.shape-rounded { border-radius: 18%; }
.card-avatar.shape-square img,
.card-avatar.shape-square { border-radius: 4px; }

/* Card body */
.card-body {
  padding: 18px 20px 14px;
}
.card-title {
  font-size: 18px;
  font-weight: 700;
  line-height: 1.35;
  word-break: break-word;
  color: var(--text);
}
.card-desc {
  margin-top: 4px;
  font-size: 13px;
  font-weight: 500;
  line-height: 1.5;
  color: var(--text2);
  white-space: pre-wrap;
  word-break: break-word;
}

/* Card buttons (用戶設定的，全寬長條) */
.card-buttons {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 0 16px 16px;
}
.card-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border: none;
  border-radius: var(--r-btn);
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  transition: filter .15s, transform .1s;
  font-family: inherit;
  letter-spacing: -.005em;
}
.card-btn:hover { filter: brightness(1.08); }
.card-btn:active { transform: scale(.98); }
.card-btn.style-primary {
  /* color comes from inline style (b.color) */
}
.card-btn.style-secondary {
  /* color comes from inline style */
}
.card-btn.style-link {
  background: transparent !important;
  border: 1px solid var(--line-strong);
  /* color comes from inline style */
}

/* ═══ Utility row (LINE share) ═══ */
.card-utility {
  display: flex;
  justify-content: center;
  padding: 12px 16px 16px;
  border-top: 1px solid var(--line);
  margin-top: 4px;
}
.util-btn.line-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  background: var(--text);
  color: var(--card-bg);
  border: 1px solid var(--text);
  border-radius: 8px;
  min-width: 200px;
  padding: 12px 36px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .02em;
  cursor: pointer;
  transition: all .15s;
  text-transform: uppercase;
  line-height: 1;
}
.util-btn.line-btn:hover { background: #333; }
.util-btn.line-btn:active { transform: scale(.96); }

/* Toast */
.toast {
  position: fixed;
  left: 50%;
  bottom: 20px;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: var(--card-bg);
  padding: 10px 18px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .04em;
  z-index: 1000;
  opacity: 0;
  transition: all .25s;
  pointer-events: none;
  white-space: nowrap;
  box-shadow: 0 8px 24px rgba(0,0,0,.2);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Footer */
.powered {
  text-align: center;
  padding: 16px 20px 32px;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: .04em;
}
.powered a { color: inherit; text-decoration: none; }
.powered a:hover { color: var(--text); }
</style>
</head>
<body>

<header class="nav">
  <div class="nav-mark">THE TAG</div>
  <div class="nav-meta">DIGITAL CARD</div>
</header>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">載入中</div>
</div>

<div id="error" hidden>
  <div class="error-mark">🔍</div>
  <div class="error-title" id="error-title">找不到名片</div>
  <div class="error-msg" id="error-msg">連結可能已失效。</div>
</div>

<main id="content" hidden>
  <div class="cards-wrap" id="cards">
    <div id="loading-spinner" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:#888">
      <div style="width:36px;height:36px;border:3px solid #eee;border-top-color:#06c755;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:12px"></div>
      <div style="font-size:13px">載入名片中...</div>
    </div>
  </div>
  <div class="powered">
    <a href="https://thetag.tw" target="_blank" rel="noopener">THE TAG · 橫流視覺工作室</a>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
const SB_URL = 'https://mwxyjaukrnbtdnbtceih.supabase.co';
const SB_KEY = 'sb_publishable_w-CHHu70DZXkLPGl1WltcQ_ZvMiYQa8';
const LIFF_ID = '2009436722-02IEHSWP';

const $ = (s) => document.querySelector(s);
const esc = (s) => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function getCardId() {
  const q = new URLSearchParams(location.search);
  let id = q.get('id') || q.get('pid');
  if (id) return id;
  const liffState = q.get('liff.state');
  if (liffState) {
    let inner = liffState;
    if (inner.startsWith('?')) inner = inner.substring(1);
    try {
      const innerQ = new URLSearchParams(inner);
      id = innerQ.get('id') || innerQ.get('pid');
      if (id) return id;
    } catch (e) {}
  }
  if (location.hash) {
    const h = new URLSearchParams(location.hash.substring(1));
    id = h.get('id') || h.get('pid');
    if (id) return id;
  }
  return null;
}

let _toastTimer = null;
function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

function showError(msg) {
  $('#loading').hidden = true;
  $('#content').hidden = true;
  if (msg) $('#error-msg').textContent = msg;
  $('#error').hidden = false;
}

async function fetchCard(id) {
  const sb = supabase.createClient(SB_URL, SB_KEY);
  const { data: row, error } = await sb.from('card').select('*').eq('id', id).single();
  if (error) throw error;
  if (!row) throw new Error('找不到名片資料');
  let state;
  try {
    state = typeof row.data === 'string' ? JSON.parse(row.data) : row.data;
  } catch (e) {
    throw new Error('資料格式錯誤：' + e.message);
  }
  return { row, state };
}

function parseRatio(r) {
  const m = String(r || '20:13').match(/^(\d+)\s*:\s*(\d+)$/);
  if (!m) return '20 / 13';
  return `${m[1]} / ${m[2]}`;
}

// 大頭照位置（match card-editor 的 avatarPos / avatarSize / avatarShape）
function getAvatarStyle(c) {
  const sizeMap = { sm: 60, md: 80, lg: 100 };
  const baseSize = sizeMap[c.avatarSize || 'md'];
  const scale = c.avatarScale || 1;
  let w, h;
  if (c.avatarShape === 'portrait') { w = baseSize * 0.75 * scale; h = baseSize * scale; }
  else if (c.avatarShape === 'landscape') { w = baseSize * scale; h = baseSize * 0.75 * scale; }
  else { w = baseSize * scale; h = baseSize * scale; }

  const margin = 12;
  let pos = '';
  if (c.avatarPos === 'right') {
    pos = `right: ${margin}px;`;
  } else if (c.avatarPos === 'center') {
    pos = `left: 50%; transform: translateX(-50%);`;
  } else {
    pos = `left: ${margin}px;`;
  }
  pos += `bottom: -${h * 0.25}px;`;

  let shape = c.avatarShape || 'circle';
  if (shape !== 'circle' && shape !== 'rounded' && shape !== 'square') shape = 'square';

  const transforms = [];
  if(c.avatarFlipX) transforms.push('scaleX(-1)');
  if(c.avatarRotate) transforms.push(`rotate(${c.avatarRotate}deg)`);
  const imgTransform = transforms.length ? `transform: ${transforms.join(' ')};` : '';

  return {
    wrapStyle: `${pos} width: ${w}px; height: ${h}px;`,
    imgStyle: imgTransform,
    shapeClass: 'shape-' + shape
  };
}

function renderCards(state) {
  const cards = (state.cards || []).filter(c => c && (c.title || c.desc || c.bgImgUrl || c.avatarUrl || c.buttons?.length || c.heroTitle || c.bgMode === 'color'));
  if (!cards.length) {
    showError('這張名片還沒有內容');
    return;
  }

  const pendingCards = state.pendingMsg?.contents?.contents || [];
  const isValidUrl = (s) => s && typeof s === 'string' && (s.startsWith('http') || s.startsWith('data:'));
  const getHero = (idx, card) => {
    const fromPending = pendingCards[idx]?.hero?.url;
    if (isValidUrl(fromPending)) return {url: fromPending, alreadyHasAvatar: true};
    if (isValidUrl(card.bgImgUrl)) return {url: card.bgImgUrl, alreadyHasAvatar: false};
    if (isValidUrl(card.bgImgData)) return {url: card.bgImgData, alreadyHasAvatar: false};
    return {url: '', alreadyHasAvatar: false};
  };
  const getAvatar = (card) => {
    if (isValidUrl(card.avatarUrl)) return card.avatarUrl;
    if (isValidUrl(card.avatarData)) return card.avatarData;
    return '';
  };

  const defaultRatio = parseRatio(state.ratio);
  const cardRatioStr = (c) => parseRatio(c.ratio || state.ratio);

  const wrap = $('#cards');
  wrap.innerHTML = cards.map((c, i) => {
    const heroInfo = getHero(i, c);
    const heroUrl = heroInfo.url;
    const avatarSrc = getAvatar(c);
    const shouldRenderAvatarOverlay = false;
    const av = null;

    const isColorMode = c.bgMode === 'color';
    const heroBgStyle = isColorMode
      ? `background-color:${esc(c.bgSolidColor || '#0d0d0d')};`
      : (heroUrl
          ? `background-image:url(${JSON.stringify(heroUrl).slice(1,-1)});`
          : `background-color:${esc(c.bgColor || '#ffffff')};`);
    const heroFlipClass = (!isColorMode && c.bgFlipX) ? ' flip' : '';

    const HERO_FONTS = {
      sans:        "'Noto Sans TC', -apple-system, sans-serif",
      serif:       "'Noto Serif TC', serif",
      kai:         "'ZCOOL XiaoWei', 'BiauKai', sans-serif",
      rounded_tc:  "'ZCOOL KuaiLe', sans-serif",
      bold_tc:     "'ZCOOL QingKe HuangYou', sans-serif",
      brush:       "'Ma Shan Zheng', cursive",
      brush2:      "'Liu Jian Mao Cao', cursive",
      pixel:       "'Press Start 2P', monospace",
      pixel_tall:  "'VT323', monospace",
      pixelify:    "'Pixelify Sans', 'Press Start 2P', monospace",
      silkscreen:  "'Silkscreen', 'Press Start 2P', monospace",
      jersey:      "'Jersey 10', 'Press Start 2P', monospace",
      tiny5:       "'Tiny5', 'Press Start 2P', monospace",
      display:     "'Bebas Neue', sans-serif",
      bungee:      "'Bungee', sans-serif",
      marker:      "'Permanent Marker', cursive",
      caveat:      "'Caveat', cursive",
      pacifico:    "'Pacifico', cursive",
      playfair:    "'Playfair Display', serif",
      cinzel:      "'Cinzel', serif",
      plaster:     "'Plaster', sans-serif",
      major_mono:  "'Major Mono Display', monospace",
      russo:       "'Russo One', sans-serif",
      anton:       "'Anton', sans-serif",
      dot_gothic:  "'DotGothic16', monospace",
      mono:        "ui-monospace, monospace"
    };
    const heroTitleSizeMap = {sm:'5vw', md:'7vw', lg:'10vw'};
    const heroTitleAlignMap = {left:'flex-start', center:'center', right:'flex-end'};
    const SHARE_PREVIEW_W = 520, EDITOR_PREVIEW_W = 210;
    const offsetScale = SHARE_PREVIEW_W / EDITOR_PREVIEW_W;
    const htX = (c.heroTitleX || 0) * offsetScale;
    const htY = (c.heroTitleY || 0) * offsetScale;
    const heroFont = HERO_FONTS[c.heroTitleFont] || HERO_FONTS.sans;
    const htScale = c.heroTitleScale || 1.0;
    const htRotate = c.heroTitleRotate || 0;
    const heroTitleHtml = c.heroTitle ? `
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:${heroTitleAlignMap[c.heroTitlePos||'center']};padding:0 5%;z-index:3;pointer-events:none;transform:translate(${htX}px,${htY}px);overflow:visible">
        <div style="font-size:clamp(20px,${heroTitleSizeMap[c.heroTitleSize||'md']},48px);color:${esc(c.heroTitleColor||'#fff')};font-weight:800;letter-spacing:.02em;line-height:1.15;text-align:${esc(c.heroTitlePos||'center')};text-shadow:0 2px 10px rgba(0,0,0,.4);white-space:nowrap;font-family:${heroFont};transform:rotate(${htRotate}deg) scale(${htScale});transform-origin:center">${esc(c.heroTitle)}</div>
      </div>
    ` : '';

    const heroHtml = `<div class="card-hero${heroFlipClass}" style="aspect-ratio:${cardRatioStr(c)};${heroBgStyle}${c.link ? 'cursor:pointer;' : ''};position:relative" ${c.link ? `data-link="${esc(c.link)}"` : ''}>
        ${shouldRenderAvatarOverlay ? `<div class="card-avatar ${av.shapeClass}" style="${av.wrapStyle}"><img src="${esc(avatarSrc)}" alt="" style="${av.imgStyle}"></div>` : ''}
        ${heroTitleHtml}
      </div>`;

    const titleStyle = `text-align:${esc(c.titleAlign||'left')};font-family:${HERO_FONTS[c.titleFont]||HERO_FONTS.sans}`;
    const descStyle  = `text-align:${esc(c.descAlign||'left')};font-family:${HERO_FONTS[c.descFont]||HERO_FONTS.sans}`;
    const titleHtml = c.title
      ? `<div class="card-title" style="${titleStyle}">${esc(c.title)}</div>`
      : '';
    const descHtml = c.desc
      ? `<div class="card-desc" style="${descStyle}">${esc(c.desc)}</div>`
      : '';
    const bodyHtml = (titleHtml || descHtml)
      ? `<div class="card-body">${titleHtml}${descHtml}</div>`
      : '';

    const userBtnsHtml = (c.buttons || []).map(b => {
      const label = b.label || '按鈕';
      const link = b.link || '#';
      const style = b.style || 'primary';
      const isExt = !link.startsWith('tel:') && !link.startsWith('mailto:');

      let bg, color;
      if (style === 'primary') {
        bg = b.color || '#111111';
        color = '#ffffff';
      } else if (style === 'secondary') {
        bg = b.color || '#f0f0f0';
        color = '#111111';
      } else {
        bg = 'transparent';
        color = b.color || '#111111';
      }

      return `<a class="card-btn style-${esc(style)}"
                 href="${esc(link)}"
                 target="${isExt ? '_blank' : '_self'}"
                 rel="noopener"
                 style="background:${esc(bg)};color:${esc(color)}">
        <span>${esc(label)}</span>
        <span class="arrow">→</span>
      </a>`;
    }).join('');

    const btnsWrap = c.buttons?.length
      ? `<div class="card-buttons" style="background:${esc(c.footerBg || '#fff')}">${userBtnsHtml}</div>`
      : '';

    const utilHtml = `<div class="card-utility">
      <button class="util-btn line-btn" data-act="line" data-card-idx="${i}">+ LINE</button>
    </div>`;

    return `<article class="card">
      ${heroHtml}
      ${bodyHtml}
      ${btnsWrap}
      ${utilHtml}
    </article>`;
  }).join('');

  // hero click → open link
  wrap.querySelectorAll('.card-hero[data-link]').forEach(el => {
    el.addEventListener('click', () => {
      window.open(el.dataset.link, '_blank', 'noopener');
    });
  });

  // LINE button bind
  wrap.querySelectorAll('.util-btn.line-btn').forEach(btn => {
    btn.addEventListener('click', () => sendToLine(state));
  });

  // OG tags
  const c0 = cards[0];
  const firstTitle = c0?.title || state.projectName || '數位名片';
  const firstDesc = c0?.desc || state.altText || 'THE TAG 數位名片';
  const firstImg = getHero(0, c0).url;
  document.title = firstTitle + ' · 數位名片';
  document.querySelector('meta[property="og:title"]').content = firstTitle;
  document.querySelector('meta[property="og:description"]').content = firstDesc.slice(0, 120);
  if (firstImg && typeof firstImg === 'string' && firstImg.startsWith('http')) {
    document.querySelector('meta[property="og:image"]').content = firstImg;
  }
}

/* ─── LINE 分享（含權限錯誤重新授權） ─── */

function doReauth() {
  // 清除登入狀態，重新走 LIFF login 以觸發權限再授權畫面
  try { liff.logout(); } catch (e) { /* ignore */ }
  liff.login({ redirectUri: location.href });
}

async function sendToLine(state) {
  if (typeof liff === 'undefined') {
    // LIFF SDK 沒載入 → fallback 用 LINE URL scheme 分享純文字連結
    window.location.href = 'https://line.me/R/msg/text/?' + encodeURIComponent(location.href);
    return;
  }
  try {
    if (!liff.isApiAvailable('shareTargetPicker')) {
      // 不在 LINE 內或 API 不可用 → fallback 到 LINE URL scheme
      window.location.href = 'https://line.me/R/msg/text/?' + encodeURIComponent(location.href);
      return;
    }
    const msg = state.pendingMsg;
    if (!msg) { toast('沒有 Flex 資料，請重新發布'); return; }
    toast('開啟分享…');
    const res = await liff.shareTargetPicker([msg]);
    if (res?.status === 'success') toast('分享成功');
  } catch (e) {
    console.error('sendToLine error:', e);
    const errMsg = String(e.message || e);
    // 權限不足 → 重新登入授權
    if (errMsg.includes('permission') || errMsg.includes('grant')) {
      toast('需要授權，正在重新登入…');
      setTimeout(doReauth, 800);
      return;
    }
    toast('分享失敗：' + errMsg);
  }
}

async function initLiffOptional() {
  if (typeof liff === 'undefined') return;
  try {
    await liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: false });
  } catch (e) {
    console.warn('LIFF init skipped:', e.message);
  }
}

// Watchdog: 8 秒後若還在 loading，強制顯示診斷 + 重整提示
let _mainStage = 'init';
setTimeout(() => {
  const loading = $('#loading');
  if (loading && !loading.hidden) {
    showError('載入卡住（停在「' + _mainStage + '」）— 請強制重整（Cmd+Shift+R）或換瀏覽器試。LINE App 內建瀏覽器 cache 太舊也會這樣。');
  }
}, 8000);

(async function main() {
  _mainStage = 'getCardId';
  const id = getCardId();
  if (!id) {
    showError('URL 缺少名片 ID（share.html?id=xxxx）');
    return;
  }

  _mainStage = 'liff init';
  await initLiffOptional();

  _mainStage = 'fetchCard';
  let state;
  try {
    const { state: s } = await fetchCard(id);
    state = s;
  } catch (e) {
    console.error(e);
    if (String(e.message || e).includes('Row not found') || e.code === 'PGRST116') {
      showError('找不到這張名片，可能已被刪除');
    } else {
      showError('載入失敗：' + (e.message || '請稍後再試'));
    }
    return;
  }

  _mainStage = 'renderCards';
  try {
    renderCards(state);
    $('#loading').hidden = true;
    $('#content').hidden = false;
    _mainStage = 'done';
  } catch(e){
    console.error('renderCards 失敗', e);
    showError('渲染名片失敗：' + (e.message || e) + '\n\n（' + (e.stack||'').slice(0,200) + '）');
  }
})();
</script>
