<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>THE TAG 名片發送</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#fff;border-radius:20px;padding:40px 32px;max-width:360px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.12)}
.logo{font-size:48px;margin-bottom:16px}
.title{font-size:20px;font-weight:800;color:#00b900;margin-bottom:8px}
.sub{font-size:14px;color:#888;margin-bottom:32px;line-height:1.6}
.status{font-size:15px;color:#444;margin-bottom:8px;font-weight:600}
.progress{width:100%;height:6px;background:#e8e8e8;border-radius:3px;overflow:hidden;margin-bottom:24px}
.bar{height:100%;background:#00b900;border-radius:3px;transition:width .4s;width:0%}
.btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;display:none}
.btn-green{background:#00b900;color:#fff}
.err{color:#e53935;font-size:13px;margin-top:16px;line-height:1.5;display:none;background:#fff0f0;padding:12px;border-radius:8px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">📇</div>
  <div class="title">THE TAG 名片發送</div>
  <div class="sub" id="sub">正在準備名片資料...</div>
  <div class="status" id="status">⏳ 初始化中...</div>
  <div class="progress"><div class="bar" id="bar"></div></div>
  <button class="btn btn-green" id="btn-share" onclick="doShare()">📤 選擇傳送對象</button>
  <button class="btn" id="btn-retry" onclick="location.reload()" style="background:#f5f5f5;color:#666;border:1.5px solid #e0e0e0">🔄 重試</button>
  <div class="err" id="err"></div>
</div>

<script>
const LIFF_ID = '2009436722-KlVkAIhF';
const SB_URL = 'https://mwxyjaukrnbtdnbtceih.supabase.co';
const SB_KEY = 'sb_publishable_w-CHHu70DZXkLPGl1WltcQ_ZvMiYQa8';
let pendingMsg = null;

function setP(p){ document.getElementById('bar').style.width = p+'%'; }
function setSt(t){ document.getElementById('status').textContent = t; }
function setSub(t){ document.getElementById('sub').textContent = t; }
function showErr(msg){
  document.getElementById('err').style.display='block';
  document.getElementById('err').textContent = '❌ '+msg;
  document.getElementById('btn-retry').style.display='block';
  setSt('發生錯誤');
}

async function doShare(){
  try{
    document.getElementById('btn-share').style.display='none';
    setSt('📤 開啟選人畫面...');
    const result = await liff.shareTargetPicker([pendingMsg]);
    if(result){
      setSt('✅ 名片已發送！');
      setSub('成功！對方已收到你的名片。');
      setP(100);
      setTimeout(()=>{ try{ liff.closeWindow(); }catch(e){} }, 1500);
    } else {
      setSt('已取消，可重新發送');
      document.getElementById('btn-share').style.display='block';
    }
  }catch(e){
    showErr('發送失敗：'+e.message);
  }
}

// 從 URL 讀取 pid
function getPidFromUrl(){
  const sp = new URLSearchParams(location.search);
  let pid = sp.get('pid');
  if(!pid){
    const liffState = sp.get('liff.state');
    if(liffState){
      try{
        const decoded = decodeURIComponent(liffState);
        pid = new URLSearchParams(decoded.startsWith('?')?decoded.slice(1):decoded).get('pid');
      }catch(e){}
    }
  }
  return pid;
}

window.addEventListener('load', async function(){
  try{
    // 如果有 liff.state，讓 LIFF SDK 自己處理跳轉
    if(new URLSearchParams(location.search).get('liff.state')){
      setSt('⏳ 跳轉中...');
      return;
    }

    setP(20);
    setSt('⏳ 等待 LIFF SDK...');

    let waited = 0;
    while(typeof liff === 'undefined' && waited < 10000){
      await new Promise(r=>setTimeout(r,200));
      waited += 200;
    }
    if(typeof liff === 'undefined') throw new Error('LIFF SDK 未載入');

    setP(40);
    setSt('⏳ 初始化 LIFF...');
    await liff.init({ liffId: LIFF_ID });
    setP(60);

    // 未登入 → 先存 pid，跳去登入
    const pid = getPidFromUrl() || sessionStorage.getItem('pending_pid');
    if(!liff.isLoggedIn()){
      if(pid) sessionStorage.setItem('pending_pid', pid);
      setSt('🔐 請登入 LINE...');
      liff.login({ redirectUri: location.href });
      return;
    }

    setP(80);
    setSt('⏳ 讀取名片資料...');

    if(!pid) throw new Error('找不到名片資料，請重新從電腦發布');
    sessionStorage.removeItem('pending_pid');

    // 從 Supabase 讀取
    const sb = supabase.createClient(SB_URL, SB_KEY);
    const { data: row, error } = await sb.from('card').select('data').eq('id', pid).single();
    if(error) throw new Error('讀取失敗：'+error.message);

    const state = JSON.parse(row.data);
    if(!state.pendingMsg) throw new Error('名片資料不完整，請重新從電腦按發布');
    pendingMsg = state.pendingMsg;

    setP(100);

    // 確認 shareTargetPicker 可用
    if(!liff.isApiAvailable('shareTargetPicker')){
      throw new Error('此環境不支援發送功能');
    }

    setSt('✅ 名片準備好了！');
    setSub('點下方按鈕選擇要傳送的對象');
    document.getElementById('btn-share').style.display='block';

    // 自動觸發
    setTimeout(()=>doShare(), 500);

  }catch(e){
    console.error(e);
    showErr(e.message);
  }
});
</script>
</body>
</html>
