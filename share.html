<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="theme-color" content="#ffffff">
<title>數位名片</title>

<meta property="og:title" content="數位名片">
<meta property="og:description" content="THE TAG 數位版名片">
<meta property="og:type" content="profile">
<meta property="og:image" content="">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[hidden]{display:none!important}

:root {
  --bg: #f5f5f7;
  --card-bg: #ffffff;
  --text: #111111;
  --text2: #666666;
  --text3: #999999;
  --line: rgba(0,0,0,.08);
  --line-strong: rgba(0,0,0,.16);
  --primary: #111111;
  --font: 'Inter', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
  --r: 16px;
  --r-btn: 10px;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  letter-spacing: -.005em;
}

body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  min-height: 100dvh;
}

/* ═══ Top nav ═══ */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  background: var(--card-bg);
  border-bottom: 1px solid var(--line);
}
.nav-mark {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .04em;
}
.nav-meta {
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: .08em;
}

/* ═══ Loading ═══ */
#loading {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
  padding: 80px 24px;
}
.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--line);
  border-top-color: var(--text);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--text3); font-size: 12px; letter-spacing: .08em; }

/* ═══ Error ═══ */
#error {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  padding: 80px 24px;
  text-align: center;
  gap: 14px;
}
.error-mark { font-size: 56px; opacity: .3; }
.error-title { font-size: 16px; font-weight: 700; }
.error-msg { color: var(--text2); font-size: 13px; max-width: 320px; line-height: 1.6; }

/* ═══ Main ═══ */
#content { flex: 1; }
.cards-wrap {
  padding: 20px 16px 40px;
  max-width: 480px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
@media (min-width: 600px) {
  .cards-wrap { padding: 32px 24px 60px; }
}

/* ═══ Card ═══ */
.card {
  background: var(--card-bg);
  border-radius: var(--r);
  border: 1px solid var(--line);
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,.04);
  opacity: 0;
  transform: translateY(12px);
  animation: cardIn .4s forwards ease-out;
}
.card:nth-child(1){ animation-delay: .05s; }
.card:nth-child(2){ animation-delay: .15s; }
.card:nth-child(n+3){ animation-delay: .25s; }
@keyframes cardIn {
  to { opacity: 1; transform: translateY(0); }
}

/* Card hero (background + avatar overlay) */
.card-hero {
  position: relative;
  width: 100%;
  background: #f0f0f0;
  overflow: hidden;
}
.card-hero[data-link] { cursor: pointer; }
.card-hero img.bg {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.card-avatar {
  position: absolute;
  z-index: 2;
  pointer-events: none;
}
.card-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.card-avatar.shape-circle img,
.card-avatar.shape-circle { border-radius: 50%; }
.card-avatar.shape-rounded img,
.card-avatar.shape-rounded { border-radius: 18%; }
.card-avatar.shape-square img,
.card-avatar.shape-square { border-radius: 4px; }

/* Card body */
.card-body {
  padding: 18px 20px 14px;
}
.card-title {
  font-size: 18px;
  font-weight: 700;
  line-height: 1.35;
  word-break: break-word;
  color: var(--text);
}
.card-desc {
  margin-top: 4px;
  font-size: 13px;
  font-weight: 500;
  line-height: 1.5;
  color: var(--text2);
  white-space: pre-wrap;
  word-break: break-word;
}

/* Card buttons (用戶設定的，全寬長條) */
.card-buttons {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 0 16px 16px;
}
.card-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border: none;
  border-radius: var(--r-btn);
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  transition: filter .15s, transform .1s;
  font-family: inherit;
  letter-spacing: -.005em;
}
.card-btn:hover { filter: brightness(1.08); }
.card-btn:active { transform: scale(.98); }
.card-btn .arrow {
  font-weight: 600;
  opacity: .85;
}
.card-btn.style-primary {
  /* color comes from inline style (b.color) */
}
.card-btn.style-secondary {
  /* color comes from inline style */
}
.card-btn.style-link {
  background: transparent !important;
  border: 1px solid var(--line-strong);
  /* color comes from inline style */
}

/* Utility row (CONTACT / COPY / SHARE / LINE) */
.card-utility {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  padding: 8px 16px 16px;
  border-top: 1px solid var(--line);
  margin-top: 4px;
}
.card-utility.has-line { grid-template-columns: repeat(4, 1fr); }
.util-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 10px 6px;
  background: transparent;
  border: 1px solid var(--line-strong);
  border-radius: 8px;
  color: var(--text);
  font-family: inherit;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .02em;
  cursor: pointer;
  transition: all .15s;
  text-transform: uppercase;
  line-height: 1;
}
.util-btn:hover {
  background: var(--text);
  color: var(--card-bg);
  border-color: var(--text);
}
.util-btn:active { transform: scale(.96); }
.util-btn.line-btn {
  background: var(--text);
  color: var(--card-bg);
  border-color: var(--text);
}
.util-btn.line-btn:hover { background: #333; }
.util-btn.hidden { display: none; }

/* Toast */
.toast {
  position: fixed;
  left: 50%;
  bottom: 20px;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: var(--card-bg);
  padding: 10px 18px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .04em;
  z-index: 1000;
  opacity: 0;
  transition: all .25s;
  pointer-events: none;
  white-space: nowrap;
  box-shadow: 0 8px 24px rgba(0,0,0,.2);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Footer */
.powered {
  text-align: center;
  padding: 16px 20px 32px;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: .04em;
}
.powered a { color: inherit; text-decoration: none; }
.powered a:hover { color: var(--text); }

/* QR modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--card-bg);
  border-radius: 14px;
  padding: 28px 24px;
  max-width: 320px;
  width: 100%;
  text-align: center;
  transform: scale(.95);
  transition: transform .2s;
}
.modal-overlay.show .modal { transform: scale(1); }
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.modal p { color: var(--text2); font-size: 12px; margin-bottom: 16px; }
.modal img.qr {
  width: 200px; height: 200px;
  background: #fff;
  padding: 8px;
  margin: 0 auto 14px;
  display: block;
  border: 1px solid var(--line);
  border-radius: 8px;
}
.modal-close {
  background: var(--text);
  border: none;
  color: var(--card-bg);
  padding: 10px 24px;
  border-radius: 100px;
  font-family: inherit;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
}
.modal-close:hover { background: #333; }
</style>
</head>
<body>

<header class="nav">
  <div class="nav-mark">THE TAG</div>
  <div class="nav-meta">DIGITAL CARD</div>
</header>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">載入中</div>
</div>

<div id="error" hidden>
  <div class="error-mark">🔍</div>
  <div class="error-title" id="error-title">找不到名片</div>
  <div class="error-msg" id="error-msg">連結可能已失效。</div>
</div>

<main id="content" hidden>
  <div class="cards-wrap" id="cards"></div>
  <div class="powered">
    <a href="https://thetag.tw" target="_blank" rel="noopener">THE TAG · 橫流視覺工作室</a>
  </div>
</main>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="qr-modal">
  <div class="modal">
    <h3>掃 QR Code</h3>
    <p>用手機開啟</p>
    <img class="qr" id="qr-img" src="" alt="QR Code">
    <button class="modal-close" onclick="closeQR()">關閉</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
const SB_URL = 'https://mwxyjaukrnbtdnbtceih.supabase.co';
const SB_KEY = 'sb_publishable_w-CHHu70DZXkLPGl1WltcQ_ZvMiYQa8';
const LIFF_ID = '2009436722-02IEHSWP';

const $ = (s) => document.querySelector(s);
const esc = (s) => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function getCardId() {
  const q = new URLSearchParams(location.search);
  let id = q.get('id') || q.get('pid');
  if (id) return id;
  const liffState = q.get('liff.state');
  if (liffState) {
    let inner = liffState;
    if (inner.startsWith('?')) inner = inner.substring(1);
    try {
      const innerQ = new URLSearchParams(inner);
      id = innerQ.get('id') || innerQ.get('pid');
      if (id) return id;
    } catch (e) {}
  }
  if (location.hash) {
    const h = new URLSearchParams(location.hash.substring(1));
    id = h.get('id') || h.get('pid');
    if (id) return id;
  }
  return null;
}

let _toastTimer = null;
function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

function showError(msg) {
  $('#loading').hidden = true;
  $('#content').hidden = true;
  if (msg) $('#error-msg').textContent = msg;
  $('#error').hidden = false;
}

async function fetchCard(id) {
  const sb = supabase.createClient(SB_URL, SB_KEY);
  const { data: row, error } = await sb.from('card').select('*').eq('id', id).single();
  if (error) throw error;
  if (!row) throw new Error('找不到名片資料');
  let state;
  try {
    state = typeof row.data === 'string' ? JSON.parse(row.data) : row.data;
  } catch (e) {
    throw new Error('資料格式錯誤：' + e.message);
  }
  return { row, state };
}

function parseRatio(r) {
  const m = String(r || '20:13').match(/^(\d+)\s*:\s*(\d+)$/);
  if (!m) return '20 / 13';
  return `${m[1]} / ${m[2]}`;
}

// 大頭照位置（match card-editor 的 avatarPos / avatarSize / avatarShape）
function getAvatarStyle(c) {
  const sizeMap = { sm: 60, md: 80, lg: 100 };
  const baseSize = sizeMap[c.avatarSize || 'md'];
  const scale = c.avatarScale || 1;
  let w, h;
  if (c.avatarShape === 'portrait') { w = baseSize * 0.75 * scale; h = baseSize * scale; }
  else if (c.avatarShape === 'landscape') { w = baseSize * scale; h = baseSize * 0.75 * scale; }
  else { w = baseSize * scale; h = baseSize * scale; }

  // 位置（疊在 hero 左下、中下、右下）
  const margin = 12;
  let pos = '';
  if (c.avatarPos === 'right') {
    pos = `right: ${margin}px;`;
  } else if (c.avatarPos === 'center') {
    pos = `left: 50%; transform: translateX(-50%);`;
  } else {
    pos = `left: ${margin}px;`;
  }
  // 預設疊在 hero 底部，部分超出 hero 邊界
  pos += `bottom: -${h * 0.25}px;`;

  let shape = c.avatarShape || 'circle';
  if (shape !== 'circle' && shape !== 'rounded' && shape !== 'square') shape = 'square';

  const flipX = c.avatarFlipX ? 'transform: scaleX(-1);' : '';

  return {
    wrapStyle: `${pos} width: ${w}px; height: ${h}px;`,
    imgStyle: flipX,
    shapeClass: 'shape-' + shape
  };
}

function renderCards(state) {
  const cards = (state.cards || []).filter(c => c && (c.title || c.desc || c.bgImgUrl || c.avatarUrl || c.buttons?.length));
  if (!cards.length) {
    showError('這張名片還沒有內容');
    return;
  }

  const pendingCards = state.pendingMsg?.contents?.contents || [];
  const getHero = (idx, card) => {
    const fromPending = pendingCards[idx]?.hero?.url;
    if (fromPending) return fromPending;
    return card.bgImgUrl || card.bgImgData || '';
  };
  const getAvatar = (card) => card.avatarUrl || card.avatarData || '';

  const ratio = parseRatio(state.ratio);

  // 偵測 LINE 環境：在 LINE 內顯示 LINE button
  const showLineBtn = (typeof liff !== 'undefined' && liff.isInClient?.()) ? true : false;

  const wrap = $('#cards');
  wrap.innerHTML = cards.map((c, i) => {
    const hero = getHero(i, c);
    const avatarSrc = getAvatar(c);
    const av = avatarSrc ? getAvatarStyle(c) : null;

    // hero 區（含 avatar overlay）
    const heroHtml = `<div class="card-hero" style="aspect-ratio:${ratio};${c.link ? 'cursor:pointer' : ''}" ${c.link ? `data-link="${esc(c.link)}"` : ''}>
        ${hero ? `<img class="bg" src="${esc(hero)}" alt="${esc(c.title || '')}" loading="lazy" style="${c.bgFlipX ? 'transform:scaleX(-1);' : ''}">` : ''}
        ${avatarSrc ? `<div class="card-avatar ${av.shapeClass}" style="${av.wrapStyle}"><img src="${esc(avatarSrc)}" alt="" style="${av.imgStyle}"></div>` : ''}
      </div>`;

    // body
    const titleHtml = c.title
      ? `<div class="card-title">${esc(c.title)}</div>`
      : '';
    const descHtml = c.desc
      ? `<div class="card-desc">${esc(c.desc)}</div>`
      : '';
    const bodyHtml = (titleHtml || descHtml)
      ? `<div class="card-body" style="${avatarSrc ? `padding-top:${(av && av.wrapStyle.includes('100px')) ? 56 : 44}px` : ''}">${titleHtml}${descHtml}</div>`
      : '';

    // 用戶設定的 buttons（全寬長條，保留用戶顏色）
    const userBtnsHtml = (c.buttons || []).map(b => {
      const label = b.label || '按鈕';
      const link = b.link || '#';
      const style = b.style || 'primary';
      const isExt = !link.startsWith('tel:') && !link.startsWith('mailto:');

      let bg, color;
      if (style === 'primary') {
        bg = b.color || '#111111';
        color = '#ffffff';
      } else if (style === 'secondary') {
        bg = b.color || '#f0f0f0';
        color = '#111111';
      } else {
        bg = 'transparent';
        color = b.color || '#111111';
      }

      return `<a class="card-btn style-${esc(style)}"
                 href="${esc(link)}"
                 target="${isExt ? '_blank' : '_self'}"
                 rel="noopener"
                 style="background:${esc(bg)};color:${esc(color)}">
        <span>${esc(label)}</span>
        <span class="arrow">→</span>
      </a>`;
    }).join('');

    const btnsWrap = c.buttons?.length
      ? `<div class="card-buttons" style="background:${esc(c.footerBg || '#fff')}">${userBtnsHtml}</div>`
      : '';

    // 卡片內 utility row（CONTACT / COPY / SHARE / 在 LINE 內顯示 LINE）
    const utilHtml = `<div class="card-utility ${showLineBtn ? 'has-line' : ''}">
      <button class="util-btn" data-act="vcard" data-card-idx="${i}">+ Contact</button>
      <button class="util-btn" data-act="copy" data-card-idx="${i}">+ Copy</button>
      <button class="util-btn" data-act="share" data-card-idx="${i}">+ Share</button>
      ${showLineBtn ? `<button class="util-btn line-btn" data-act="line" data-card-idx="${i}">+ LINE</button>` : ''}
    </div>`;

    return `<article class="card">
      ${heroHtml}
      ${bodyHtml}
      ${btnsWrap}
      ${utilHtml}
    </article>`;
  }).join('');

  // hero click → open link
  wrap.querySelectorAll('.card-hero[data-link]').forEach(el => {
    el.addEventListener('click', () => {
      window.open(el.dataset.link, '_blank', 'noopener');
    });
  });

  // utility button bind
  wrap.querySelectorAll('.util-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const act = btn.dataset.act;
      if (act === 'vcard') downloadVCard(state);
      else if (act === 'copy') copyLink();
      else if (act === 'share') shareLink(state);
      else if (act === 'line') sendToLine(state);
    });
  });

  // OG tags
  const c0 = cards[0];
  const firstTitle = c0?.title || state.projectName || '數位名片';
  const firstDesc = c0?.desc || state.altText || 'THE TAG 數位名片';
  const firstImg = getHero(0, c0);
  document.title = firstTitle + ' · 數位名片';
  document.querySelector('meta[property="og:title"]').content = firstTitle;
  document.querySelector('meta[property="og:description"]').content = firstDesc.slice(0, 120);
  if (firstImg && firstImg.startsWith('http')) {
    document.querySelector('meta[property="og:image"]').content = firstImg;
  }
}

function buildVCard(state) {
  const cards = state.cards || [];
  const c = cards[0] || {};
  const name = c.title || state.projectName || '數位名片';
  const desc = c.desc || '';

  const buttons = cards.flatMap(cc => cc.buttons || []);
  const tels = [], emails = [], urls = [];
  for (const b of buttons) {
    const link = b.link || '';
    if (link.startsWith('tel:')) tels.push(link.slice(4));
    else if (link.startsWith('mailto:')) emails.push(link.slice(7));
    else if (/^https?:\/\//.test(link)) urls.push(link);
  }
  for (const cc of cards) {
    if (cc.link && /^https?:\/\//.test(cc.link) && !urls.includes(cc.link)) urls.push(cc.link);
  }

  const lines = ['BEGIN:VCARD', 'VERSION:3.0'];
  lines.push('FN:' + name);
  if (desc) lines.push('NOTE:' + desc.replace(/\n/g, '\\n'));
  tels.forEach(t => lines.push('TEL;TYPE=CELL:' + t));
  emails.forEach(e => lines.push('EMAIL:' + e));
  urls.forEach(u => lines.push('URL:' + u));
  lines.push('END:VCARD');
  return lines.join('\r\n');
}

function downloadVCard(state) {
  const vcf = buildVCard(state);
  const blob = new Blob([vcf], { type: 'text/vcard;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const name = (state.cards?.[0]?.title || state.projectName || 'contact').replace(/[^\w一-龥\-]/g, '_');
  a.href = url;
  a.download = name + '.vcf';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
  toast('通訊錄已下載');
}

async function copyLink() {
  try {
    await navigator.clipboard.writeText(location.href);
    toast('連結已複製');
  } catch (e) {
    const ta = document.createElement('textarea');
    ta.value = location.href;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); toast('連結已複製'); }
    catch { toast('複製失敗'); }
    ta.remove();
  }
}

async function shareLink(state) {
  const title = state.cards?.[0]?.title || '數位名片';
  const text = state.altText || '請查看數位名片';
  if (navigator.share) {
    try {
      await navigator.share({ title, text, url: location.href });
    } catch (e) {
      if (e.name !== 'AbortError') toast('分享失敗：' + e.message);
    }
  } else {
    showQR(location.href);
  }
}

function showQR(url) {
  $('#qr-img').src = 'https://api.qrserver.com/v1/create-qr-code/?size=440x440&data=' + encodeURIComponent(url);
  $('#qr-modal').classList.add('show');
}
window.closeQR = function() { $('#qr-modal').classList.remove('show'); };

async function sendToLine(state) {
  if (typeof liff === 'undefined') { toast('LINE SDK 未載入'); return; }
  try {
    if (!liff.isApiAvailable('shareTargetPicker')) {
      window.location.href = 'https://line.me/R/msg/text/?' + encodeURIComponent(location.href);
      return;
    }
    const msg = state.pendingMsg;
    if (!msg) { toast('沒有 Flex 資料，請重新發布'); return; }
    toast('開啟分享…');
    const res = await liff.shareTargetPicker([msg]);
    if (res?.status === 'success') toast('分享成功');
  } catch (e) {
    console.error(e);
    toast('分享失敗：' + e.message);
  }
}

async function initLiffOptional() {
  if (typeof liff === 'undefined') return;
  try {
    await liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: false });
    if (liff.isInClient() && liff.isApiAvailable?.('shareTargetPicker')) {
      // 重新 render 一次以加入 LINE button
      window._showLineBtn = true;
      // 簡單方式：直接顯示所有 hidden line-btn
      // (renderCards 已根據 isInClient 判斷)
    }
  } catch (e) {
    console.warn('LIFF init skipped:', e.message);
  }
}

(async function main() {
  const id = getCardId();
  if (!id) {
    showError('URL 缺少名片 ID（share.html?id=xxxx）');
    return;
  }

  // LIFF init 先（決定 isInClient 才 render）
  await initLiffOptional();

  let state;
  try {
    const { state: s } = await fetchCard(id);
    state = s;
  } catch (e) {
    console.error(e);
    if (String(e.message || e).includes('Row not found') || e.code === 'PGRST116') {
      showError('找不到這張名片，可能已被刪除');
    } else {
      showError('載入失敗：' + (e.message || '請稍後再試'));
    }
    return;
  }

  renderCards(state);
  $('#loading').hidden = true;
  $('#content').hidden = false;
})();
</script>
