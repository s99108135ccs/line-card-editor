<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>THE TAG 名片發送</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#fff;border-radius:20px;padding:40px 28px;max-width:360px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.12)}
.logo{font-size:48px;margin-bottom:12px}
.title{font-size:20px;font-weight:800;color:#00b900;margin-bottom:6px}
.sub{font-size:13px;color:#999;margin-bottom:28px;line-height:1.6}
.status{font-size:15px;color:#333;font-weight:600;margin-bottom:10px;min-height:24px}
.bar-wrap{width:100%;height:6px;background:#eee;border-radius:3px;overflow:hidden;margin-bottom:28px}
.bar{height:100%;background:#00b900;border-radius:3px;transition:width .4s ease;width:0%}
.btn{width:100%;padding:15px;border-radius:12px;border:none;font-size:16px;font-weight:700;cursor:pointer;display:none;margin-top:6px}
.btn-green{background:#00b900;color:#fff}
.btn-gray{background:#f0f0f0;color:#666}
.err-box{background:#fff0f0;border-radius:10px;padding:14px;color:#c62828;font-size:13px;line-height:1.6;margin-top:16px;display:none;text-align:left}
</style>
</head>
<body>
<div class="card">
  <div class="logo">📇</div>
  <div class="title">THE TAG 名片發送</div>
  <div class="sub" id="sub">正在準備你的名片...</div>
  <div class="status" id="status">⏳ 初始化中...</div>
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>
  <button class="btn btn-green" id="btn-share" onclick="doShare()">📤 選擇傳送對象</button>
  <button class="btn btn-gray" id="btn-retry" onclick="location.reload()">🔄 重試</button>
  <div class="err-box" id="err"></div>
</div>

<script>
const LIFF_ID = '2009436722-02IEHSWP';
const SB_URL = 'https://mwxyjaukrnbtdnbtceih.supabase.co';
const SB_KEY = 'sb_publishable_w-CHHu70DZXkLPGl1WltcQ_ZvMiYQa8';
const LATEST_KEY = 'tag_latest_card_id';
let pendingMsg = null;

const $  = id => document.getElementById(id);
const setP  = p  => $('bar').style.width = p + '%';
const setSt = t  => { $('status').textContent = t; }
const setSub= t  => { $('sub').textContent = t; }

function showErr(msg) {
  $('err').style.display = 'block';
  $('err').textContent = '❌ ' + msg;
  $('btn-retry').style.display = 'block';
  setSt('發生錯誤');
  setP(0);
}

async function doShare() {
  try {
    $('btn-share').style.display = 'none';
    setSt('📤 開啟選人畫面...');
    const result = await liff.shareTargetPicker([pendingMsg]);
    if (result) {
      setSt('✅ 名片已發送！');
      setSub('對方已收到你的名片 🎉');
      setP(100);
      setTimeout(() => { try { liff.closeWindow(); } catch(e) {} }, 2000);
    } else {
      setSt('已取消');
      $('btn-share').style.display = 'block';
    }
  } catch(e) {
    showErr('發送失敗：' + e.message);
  }
}

function getPid() {
  // 1. URL 直接有 pid
  const sp = new URLSearchParams(location.search);
  if (sp.get('pid')) return sp.get('pid');

  // 2. liff.state 裡有 pid（LIFF 跳轉後會把原本的 query 放這裡）
  const liffState = sp.get('liff.state');
  if (liffState) {
    try {
      const s = decodeURIComponent(liffState);
      const p = new URLSearchParams(s.startsWith('?') ? s.slice(1) : s);
      if (p.get('pid')) return p.get('pid');
    } catch(e) {}
  }

  // 3. sessionStorage（登入後回來用）
  return sessionStorage.getItem(LATEST_KEY);
}

(async function main() {
  try {
    setP(10); setSt('⏳ 載入 SDK...');

    // 等 SDK
    let w = 0;
    while (typeof liff === 'undefined' && w < 10000) {
      await new Promise(r => setTimeout(r, 200)); w += 200;
    }
    if (typeof liff === 'undefined') throw new Error('LIFF SDK 未載入');

    setP(25); setSt('⏳ 初始化 LIFF...');
    await liff.init({ liffId: LIFF_ID });
    setP(45);

    // 取得 pid（init 後 liff.state 才會被解析到 URL）
    const pid = getPid();
    if (pid) sessionStorage.setItem(LATEST_KEY, pid);

    // 未登入 → 存 pid → 登入
    if (!liff.isLoggedIn()) {
      setSt('🔐 請登入 LINE...');
      liff.login({ redirectUri: location.href });
      return;
    }

    setP(65); setSt('⏳ 讀取名片資料...');

    const usePid = pid || sessionStorage.getItem(LATEST_KEY);
    if (!usePid) throw new Error('找不到名片資料，請先在電腦按「發布」');

    const sb = supabase.createClient(SB_URL, SB_KEY);
    const { data: row, error } = await sb.from('card').select('data').eq('id', usePid).single();
    if (error) throw new Error('讀取失敗：' + error.message);
    if (!row)  throw new Error('找不到名片，請重新從電腦發布');

    const state = JSON.parse(row.data);
    if (!state.pendingMsg) throw new Error('名片資料不完整，請重新發布');
    pendingMsg = state.pendingMsg;

    setP(90); setSt('✅ 準備完成！');
    setSub('點下方按鈕選擇傳送對象');
    $('btn-share').style.display = 'block';

    // 在 LINE 內建瀏覽器自動觸發
    if (liff.isInClient()) {
      await new Promise(r => setTimeout(r, 600));
      doShare();
    }

  } catch(e) {
    showErr(e.message);
  }
})();
</script>
</body>
</html>
