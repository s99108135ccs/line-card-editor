name: Keep Supabase awake

on:
  push:
    branches: [main]
    paths: ['.github/workflows/supabase-keepalive.yml']
  schedule:
    - cron: '0 1 * * *' # 09:00 Asia/Taipei
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping the public card endpoint
        shell: bash
        run: |
          set -euo pipefail
          page="$(curl --fail --silent --show-error --location 'https://raw.githubusercontent.com/s99108135ccs/line-card-editor/main/share.html')"
          supabase_url="$(printf '%s\n' "$page" | awk -F "'" '/^const SB_URL = / { print $2; exit }')"
          supabase_key="$(printf '%s\n' "$page" | awk -F "'" '/^const SB_KEY = / { print $2; exit }')"
          test -n "$supabase_url"
          test -n "$supabase_key"

          for attempt in {1..8}; do
            status="$(curl --silent --show-error --connect-timeout 8 --max-time 12 \
              --output /dev/null --write-out '%{http_code}' \
              "$supabase_url/rest/v1/card?select=id&limit=1" \
              -H "apikey: $supabase_key" \
              -H "Authorization: Bearer $supabase_key")" || status=000
            if [ "$status" = 200 ]; then
              echo "Supabase is active (attempt $attempt)."
              exit 0
            fi
            echo "Attempt $attempt returned HTTP $status; waiting for Supabase to wake."
            sleep 10
          done

          echo 'Supabase did not respond successfully within the retry window.' >&2
          exit 1
